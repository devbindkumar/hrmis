server {
    listen 80;
    server_name hr.yourcompany.com;

    # Body size: resume PDF (10 MB) + buffer
    client_max_body_size 25M;

    root /opt/hrmis/frontend/build;
    index index.html;

    # API → FastAPI (Gunicorn on 8001)
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA — static build, fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted static assets
    location /static/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Block sneaky requests
    location ~ /\.(?!well-known) {
        deny all;
    }
}
